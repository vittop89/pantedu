# nginx config per tex-compile-vps.
# Path file: /etc/nginx/sites-available/tex-compile.conf
# Abilita: ln -s ../sites-available/tex-compile.conf /etc/nginx/sites-enabled/
# Sostituisci tex.tuosito.it con il sottodominio reale prima del deploy.

# Rate limit zones:
#   - compile: 60 req/min per IP per /compile, /compile-bundle, /synctex/edit
#   - tikz:    120 req/min per IP per /render-tikz (compile TikZ → SVG, piu' brevi e
#              piu' frequenti perche' una pagina con N disegni triggera N richieste)
# Burst configurato sotto le singole location consente raffiche brevi.
limit_req_zone $binary_remote_addr zone=compile:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=tikz:10m    rate=120r/m;

# Pre-cert: server temporaneo HTTP per ACME challenge (certbot).
# Dopo `certbot --nginx`, il blocco viene riscritto automaticamente.
server {
    listen 80;
    listen [::]:80;
    server_name tex.tuosito.it;

    # ACME http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tex.tuosito.it;

    # TLS — gestito da certbot, paths sostituiti automaticamente
    ssl_certificate     /etc/letsencrypt/live/tex.tuosito.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tex.tuosito.it/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Body size limit (sorgente .tex max 5 MB + overhead base64;
    # /compile-bundle accetta bundle fino a 10 MB → 12m totali per safety)
    client_max_body_size 12m;
    client_body_buffer_size 128k;

    # Timeout generosi: pdflatex può impiegare fino a ~30s
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Health check pubblico (no rate limit, no auth)
    location = /health {
        proxy_pass http://127.0.0.1:8001;
        access_log off;
    }

    # Endpoint compile — rate limited
    location = /compile {
        limit_req zone=compile burst=5 nodelay;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass-through degli header HMAC
        proxy_pass_request_headers on;
    }

    # G22.S4.B.3 — compile multi-file bundle. Stesso rate limit del
    # /compile single-file (le compile sono CPU-bound: il numero di pdflatex
    # concurrent e' limitato lato uvicorn da TEX_COMPILE_MAX_CONCURRENCY).
    location = /compile-bundle {
        limit_req zone=compile burst=5 nodelay;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # G21.2 — synctex CLI endpoint (reverse SyncTeX nativo TeX Live)
    location = /synctex/edit {
        limit_req zone=compile burst=10 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # G22.S15 — TikZ → SVG render (zone separata: piu' chiamate di /compile,
    # tipicamente N disegni per pagina). burst=20 assorbe il caricamento
    # iniziale di una pagina con tanti TikZ uncached prima che il client
    # entri nel suo retry-with-backoff su 503.
    location = /render-tikz {
        limit_req zone=tikz burst=20 nodelay;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # Tutto il resto: 404
    location / {
        return 404;
    }
}
