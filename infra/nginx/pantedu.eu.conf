server {
    listen 80;
    listen [::]:80;
    server_name pantedu.eu www.pantedu.eu;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    # Phase Roadmap 13 — HTTP/3 + QUIC abilitato.
    # Cloudflare proxy ha gia' HTTP/3, ma origin diretto puo' beneficiare
    # quando Cloudflare bypassa cache. Richiede nginx >= 1.25 con --with-http_v3_module.
    # listen 443 quic reuseport;
    # listen [::]:443 quic reuseport;
    # add_header Alt-Svc 'h3=":443"; ma=86400' always;
    server_name pantedu.eu www.pantedu.eu;

    # ─────────────────────────────────────────────────────────────────────
    # Cloudflare real_ip (audit sicurezza 2026-06-01).
    # Riscrive $remote_addr con l'IP CLIENT reale (CF-Connecting-IP) SOLO se
    # la connessione arriva da un range Cloudflare. Effetti:
    #   - rate-limit e log per-utente reale (non per IP Cloudflare condiviso);
    #   - l'app vede l'IP reale (REMOTE_ADDR) → EdgeContext lo considera fidato
    #     e si fida di Cf-IPCountry → geo "solo IT" robusto e non spoofabile.
    # PREREQUISITO di sicurezza: lockare l'origin ai SOLI IP Cloudflare
    # (firewall Hetzner + UFW su 80/443), altrimenti un attaccante può colpire
    # l'origin diretto. Ranges ufficiali: https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    # Marca le request come provenienti dal bordo fidato (EdgeContext lo
    # combina col controllo sui range CF): fastcgi_param impostato sotto.

    ssl_certificate     /etc/letsencrypt/live/pantedu.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pantedu.eu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Phase Roadmap 13 — Early Hints (103) per le route principali.
    # 2026-05-24 — RIMOSSI Link header nginx-livello (hardcoded /css/main.css
    # + /js/modules/bootstrap.js senza cache-bust). PHP backend
    # (public/index.php) ora invia Link header dinamici con cache-bust
    # corretto: main.bundle.css?v=mtime + bootstrap.dist.js?v=mtime.
    # Lasciare anche nginx static causava 4 Link total (2 nginx + 2 PHP) →
    # browser preloadava 4 file ma usava solo i 2 PHP (cache-bust matches
    # HTML <link>), gli altri 2 erano "preloaded but not used" warning.

    root /var/www/pantedu/public;
    index index.php index.html;
    # 128M: upload anagrafiche scuole MIUR via /admin/institutes (statali ~51MB).
    client_max_body_size 128M;

    location /css/ {
        alias /var/www/pantedu/css/;
        access_log off;
        expires 7d;
    }
    location /img/ {
        alias /var/www/pantedu/img/;
        access_log off;
        expires 30d;
    }
    location /js/ {
        alias /var/www/pantedu/js/;
        access_log off;
        expires 1d;
    }
    location /wasm/ {
        alias /var/www/pantedu/wasm/;
        access_log off;
        expires 30d;
    }
    location /views/ {
        alias /var/www/pantedu/views/;
        access_log off;
    }
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 2026-05-24 — Service Worker JS DEVE essere always-fresh: CF cachava
    # /sw.js per max-age=14400 (4h) → deploy di un nuovo SW non arrivava
    # al browser utente, stale precache list serviva HTML page con vecchi
    # <link> tags → preload warning persistenti.
    # Cache-Control: no-cache forza CF + browser a revalidate (304 If-None-Match)
    # ad ogni richiesta. Overhead trascurabile (file 5KB, revalidate veloce),
    # benefit: deploy SW immediato.
    location = /sw.js {
        # Cache-Control: per browser
        add_header Cache-Control "no-cache, must-revalidate" always;
        # CDN-Cache-Control: directive RFC-standard che CF rispetta sopra
        # Page Rules / Cache Rules. Senza, una Page Rule "Edge Cache TTL=4h"
        # sovrascriveva Cache-Control origin → CF cacheava SW per 4h.
        add_header CDN-Cache-Control "no-store" always;
        # Cloudflare-CDN-Cache-Control: header legacy CF-specific (fallback
        # se CDN-Cache-Control non riconosciuto).
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        add_header Service-Worker-Allowed "/" always;
        expires off;
    }

    # Login: rate-limit di bordo più stretto (anti-brute-force; il ban
    # persistente è applicativo). burst generoso per i NAT scolastici.
    # Richiede include di ratelimit-zones.conf nel blocco http{}.
    location = /login {
        limit_req zone=pantedu_login burst=20 nodelay;
        limit_req_status 429;
        try_files $uri /index.php?$query_string;
    }

    location / {
        # Anti-flood generico per il traffico dinamico (soglie generose).
        limit_req zone=pantedu_general burst=60 nodelay;
        limit_conn pantedu_conn 24;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # 120s: l'estrazione PDF-Import chiama LLM (vision) durante i poll; 75s
        # causava 504 sui poll più lenti. Il tool processa 1 pagina per poll.
        fastcgi_read_timeout 120s;
        # Bordo fidato per EdgeContext (geo "solo IT" + IP reale non spoofabili).
        # ATTIVARE SOLO dopo aver lockato l'origin ai soli IP Cloudflare
        # (firewall Hetzner + UFW): altrimenti un hit diretto all'origin
        # verrebbe marcato come fidato.
        # fastcgi_param WAF_EDGE_TRUSTED 1;
    }

    location ~ /\.(env|git|htaccess) { deny all; }
    location ~ ^/(storage|database|tools|tests|wiki|docs|app|bootstrap|composer\.)/ {
        deny all;
    }

    # Phase 25.R follow-up — Grafana auth_request gate (super_admin only).
    # Sub-request bypassa try_files: serve direct fastcgi a index.php con
    # REQUEST_URI fissato. POST -> override GET cosi' la route registrata
    # ($router->get('/auth/grafana-gate')) matcha sempre.
    location = /auth/grafana-gate {
        modsecurity off;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI /auth/grafana-gate;
        fastcgi_param QUERY_STRING '';
        fastcgi_param REQUEST_METHOD GET;
        fastcgi_param CONTENT_LENGTH '';
        fastcgi_param CONTENT_TYPE '';
    }

    # Grafana embed via auth_request SSO. Grafana gira su 127.0.0.1:3000
    # (no esposizione pubblica). proxy_pass SENZA trailing slash -> preserva
    # URI /grafana/* verso Grafana (configurato con serve_from_sub_path=true).
    location /grafana/ {
        auth_request /auth/grafana-gate;
        auth_request_set $grafana_user $upstream_http_x_grafana_user;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-WEBAUTH-USER $grafana_user;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;

        error_page 401 = @grafana_unauthorized;
    }
    location @grafana_unauthorized {
        return 302 /login?redirect=/admin/monitoring;
    }

    # GitHub webhook auto-deploy -> tools/webhook/github.php (HMAC sha256 verify).
    location = /_hooks/github {
        if ($request_method !~ ^POST$) { return 405; }
        client_max_body_size 1m;
        access_log off;
        error_log /var/log/nginx/pantedu-webhook.error.log warn;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/pantedu/tools/webhook/github.php;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param REMOTE_ADDR $remote_addr;
        include fastcgi_params;
    }
}
