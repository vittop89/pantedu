# Nginx server config — beta.pantedu.eu (production VPS).
#
# Phase 25.Q.4 — versionata in repo per evitare modifiche manuali non
# tracciate. Applicata da tools/webhook/deploy.sh se diff con installata
# (con backup automatico .bak-YYYYMMDD-HHMMSS).
#
# Target install path: /etc/nginx/sites-enabled/beta.pantedu.eu
#
# Note operative:
#  - SSL cert via Certbot (Let's Encrypt) → /etc/letsencrypt/live/...
#  - ModSecurity ATTIVO con OWASP CRS (4 rules loaded ~1844 inline)
#  - Webroot: /var/www/pantedu/public (PHP) + alias per css/img/js fuori
#  - WAF middleware Phase 25.C applicato dall'app PHP (geo-block IT + scoring)
#  - Webhook GitHub: incluso da /etc/nginx/snippets/pantedu-webhook.conf
#
# Storia regex blocklist `location ~ ^/(...)`:
#  - Phase 25.Q.3: aggiunto temporaneamente `vendor` per safety composer
#  - Phase 25.Q.4: rimosso `vendor` — composer vendor è fuori webroot
#    (/var/www/pantedu/vendor), il blocco era ridondante e impediva
#    self-host asset in public/vendor/quill/

server {
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsec/main.conf;
    listen 80;
    listen [::]:80;
    server_name beta.pantedu.eu;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    modsecurity_rules_file /etc/nginx/modsec/main.conf;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name beta.pantedu.eu;

    ssl_certificate     /etc/letsencrypt/live/beta.pantedu.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.pantedu.eu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/pantedu/public;
    index index.php index.html;
    client_max_body_size 40M;

    # G22.S9 — alias per asset serviti dalla project root (non public/).
    # XAMPP locale serve l'intera root come web; nginx serve solo public/
    # quindi mapppiamo /css /img /js esplicitamente.
    location /css/ {
        alias /var/www/pantedu/css/;
        access_log off;
        expires 7d;
    }
    location /img/ {
        alias /var/www/pantedu/img/;
        access_log off;
        expires 30d;
    }
    location /js/ {
        alias /var/www/pantedu/js/;
        access_log off;
        expires 1d;
    }
    location /tikzjax-develop/ {
        alias /var/www/pantedu/tikzjax-develop/;
        access_log off;
        expires 7d;
    }
    location /wasm/ {
        alias /var/www/pantedu/wasm/;
        access_log off;
        expires 30d;
    }
    location /views/ {
        alias /var/www/pantedu/views/;
        access_log off;
    }
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Phase 25.R follow-up — Grafana auth_request gate (super_admin only).
    # Exact match location per il sub-request di auth_request: bypassa
    # try_files (no file .php fisico per route /auth/grafana-gate) usando
    # `include fastcgi_params` invece di `snippets/fastcgi-php.conf`.
    # modsecurity off difensivo: auth_request non ha User-Agent/Referer.
    #
    # Phase 25.R.18 — fix HTTP 500 su POST /grafana/api/ds/query?ds_type=loki:
    # nginx auth_request sub-request **preserva il metodo HTTP originale**
    # (POST → POST). Il router PHP ha solo `$router->get('/auth/grafana-gate')`
    # → POST non matcha → 404 → nginx logga "auth request unexpected status: 404"
    # → ritorna 500 al client. Soluzione: override `REQUEST_METHOD GET` qui,
    # così il sub-request matcha sempre la route GET registrata.
    location = /auth/grafana-gate {
        modsecurity off;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI /auth/grafana-gate;
        fastcgi_param QUERY_STRING '';
        fastcgi_param REQUEST_METHOD GET;
        fastcgi_param CONTENT_LENGTH '';
        fastcgi_param CONTENT_TYPE '';
    }

    # Phase 25.R follow-up — Grafana embed via auth_request SSO.
    # Grafana gira su 127.0.0.1:3000 (no esposizione pubblica). nginx fa
    # proxy solo dopo auth_request a pantedu (super_admin gating).
    # NB: proxy_pass SENZA trailing slash → preserva URI /grafana/* verso
    # Grafana che è configurato con serve_from_sub_path=true (grafana.ini).
    location /grafana/ {
        auth_request /auth/grafana-gate;
        auth_request_set $grafana_user $upstream_http_x_grafana_user;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-WEBAUTH-USER $grafana_user;

        # WebSocket support per Grafana live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;

        # 401 da auth_request → redirect a login (super_admin not logged)
        error_page 401 = @grafana_unauthorized;
    }
    location @grafana_unauthorized {
        return 302 /login?redirect=/admin/monitoring;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 75s;
    }

    # Blocca dot-files + path sensibili
    location ~ /\.(env|git|htaccess) { deny all; }
    location ~ ^/(storage|database|tools|tests|wiki|docs|app|bootstrap|composer\.)/ {
        deny all;
    }
    include /etc/nginx/snippets/pantedu-webhook.conf;

}
