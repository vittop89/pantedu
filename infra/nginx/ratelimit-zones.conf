# Pantedu — zone rate-limit nginx (audit sicurezza 2026-06-01).
#
# Le direttive limit_req_zone vivono nel contesto http{}, NON nel server{}.
# Includere questo file dal blocco http{} (es. da nginx.conf o conf.d/):
#
#     # /etc/nginx/nginx.conf  →  http { ... include /etc/nginx/conf.d/*.conf; }
#     cp infra/nginx/ratelimit-zones.conf /etc/nginx/conf.d/pantedu-ratelimit.conf
#     nginx -t && systemctl reload nginx
#
# Le `limit_req zone=...` che USANO queste zone stanno nel vhost (server/location).
#
# Chiave = $binary_remote_addr → l'IP REALE del client SOLO se è attivo
# real_ip da Cloudflare (vedi blocco real_ip nel vhost). Senza, la chiave
# sarebbe l'IP di Cloudflare e il rate-limit risulterebbe globale.
#
# Soglie GENEROSE: i NAT scolastici condividono un IP pubblico tra molti
# studenti. Meglio rate alto + burst ampio e monitorare i 429 prima di
# stringere, che over-bloccare una scuola intera.

# Login: anti-brute-force di bordo (il ban persistente è applicativo).
limit_req_zone $binary_remote_addr zone=pantedu_login:10m rate=30r/m;

# Traffico dinamico generico (pagine + API): anti-flood volumetrico.
limit_req_zone $binary_remote_addr zone=pantedu_general:20m rate=120r/m;

# Connessioni concorrenti per IP (anti-slowloris / scraping aggressivo).
limit_conn_zone $binary_remote_addr zone=pantedu_conn:10m;
