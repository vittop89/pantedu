display_errors=On
; Phase 25.B7 — pentest 2026-05-18 FND-003: nascondi X-Powered-By + Server.
; Su hosting condiviso (legacy) questo è l'unico modo per sopprimere X-Powered-By
; (php.ini globale non modificabile); .htaccess `Header unset` può essere
; ignorato dal mod_security front-line.
expose_php=Off
max_input_time=60
max_input_vars=1000
post_max_size=128M
zlib.output_compression=Off
max_execution_time=120
opcache.jit=0
memory_limit=256M
output_buffering=4096
upload_max_filesize=128M
short_open_tag=On
