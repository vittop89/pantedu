  /tikz/render:
    get:
      tags: [Misc]
      operationId: lookupTikzRenderController
      summary: 'TikZ render cache lookup (TikzRenderController) — G22.S15'
      description: |
        Cerca un SVG TikZ in cache senza compilare. Hash = SHA-256 del
        sorgente TikZ normalizzato (vedi TikzRenderService::normalize).
        Scope: public (no auth) o teacher (Auth::user()['id'] required).
      x-controller: TikzRenderController::lookup
      parameters:
        - name: hash
          in: query
          required: true
          schema: { type: string, pattern: '^[a-f0-9]{64}$' }
        - name: scope
          in: query
          schema: { type: string, enum: [public, teacher], default: public }
      responses:
        '200':
          description: Cache hit, ritorna SVG inline
          content:
            image/svg+xml:
              schema: { type: string }
        '404':
          description: Cache miss
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Misc]
      operationId: renderTikzRenderController
      summary: 'TikZ render compile-on-demand (TikzRenderController) — G22.S15'
      description: |
        Cache-or-compile. Se hash MISS, invoca VPS /render-tikz, salva
        cache e ritorna SVG. Scope teacher cifrato envelope per docente
        (ADR-006). Vedi ADR-013.
      x-controller: TikzRenderController::render
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tikz, scope]
              properties:
                tikz:               { type: string, maxLength: 1048576 }
                scope:              { type: string, enum: [public, teacher] }
                libraries:          { type: array, items: { type: string } }
                pgfplots_libraries: { type: array, items: { type: string } }
                extra_packages:     { type: array, items: { type: string } }
                border:             { type: string, default: '2pt' }
      responses:
        '200':
          description: SVG generato (cache o compile)
          content:
            image/svg+xml:
              schema: { type: string }
        '422':
          description: Errore di compilazione TikZ
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean, enum: [false] }
                  error: { type: string }
                  log:   { type: string }
        '503':
          description: VPS endpoint non configurato (TEX_COMPILE_ENDPOINT vuoto)
        '401': { $ref: '#/components/responses/Unauthorized' }
