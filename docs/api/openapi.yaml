openapi: 3.1.0
info:
  title: Pantedu API
  version: 1.0.0
  description: |
    REST API per Pantedu — piattaforma educativa di didattica della fisica.

    **Generato automaticamente** da `tools/api/generate_openapi.php`. Le
    annotazioni request/response schema sui 30 endpoint critici sono manuali
    (sezione `paths` di `docs/api/openapi.yaml`).

    Auth: session cookie (PANTEDU_SID, httponly, samesite=Lax) o Bearer
    token solo su `/metrics`.
  contact:
    name: DPO Pantedu
    url: https://pantedu.eu/dpo-contact
  license:
    name: Proprietary
servers:
  - url: https://www.pantedu.eu
    description: Production
  - url: http://pantedu.local
    description: Local dev (XAMPP)

tags:
  - name: Misc
  - name: Auth
  - name: 'GDPR self-service (Art. 7/15-22)'
  - name: 'GDPR parent consent (Art. 8)'
  - name: 'GDPR DPO contact (Art. 12-22, 37-39)'
  - name: 'Trust Pages'
  - name: Observability
  - name: Registration
  - name: 'API Public'
  - name: Storage
  - name: Studio
  - name: 'Admin UI'
  - name: 'Teacher Content'
  - name: Risdoc
  - name: 'Risdoc Templates'
  - name: Admin

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: PANTEDU_SID
      description: Session cookie httponly + samesite=Lax + secure (prod).
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token (solo su `/metrics`, env METRICS_BEARER_TOKEN).
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: |
        Token CSRF richiesto su POST/PUT/PATCH/DELETE. Recuperabile via
        GET /auth/csrf. Alternativa: campo form `_csrf`.
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string, example: invalid_credentials }
        retry_after: { type: integer, description: Seconds before retry (rate limit) }
    Success:
      type: object
      properties:
        ok: { type: boolean, example: true }
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        role: { type: string, enum: [guest, student, teacher, collaborator, administrator] }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        active: { type: boolean }
    Consent:
      type: object
      properties:
        consent_type: { type: string, enum: [analytics, marketing, parent_8_minor] }
        status: { type: string, enum: [granted, revoked] }
        granted_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time, nullable: true }
        text_version: { type: string }
    DeletionRequest:
      type: object
      properties:
        id: { type: integer }
        status: { type: string, enum: [pending_confirm, cooling_off, executed, cancelled, expired] }
        execute_after: { type: string, format: date-time, nullable: true }
    TeacherContent:
      type: object
      properties:
        id: { type: integer }
        teacher_id: { type: integer }
        content_type: { type: string, enum: [esercizio, verifica, lab, mappa, risdoc, bes] }
        subject_code: { type: string, example: MAT }
        indirizzo: { type: string, example: ITIA }
        classe: { type: string, example: 3A }
        topic: { type: string }
        title: { type: string }
        visibility: { type: string, enum: [draft, published, archived] }
        metadata: { type: object, additionalProperties: true }
        updated_at: { type: string, format: date-time }
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: CSRF token invalid or insufficient privileges
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Invalid input (missing/malformed field)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

security:
  - sessionAuth: []

