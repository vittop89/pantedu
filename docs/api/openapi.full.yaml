    post:
      tags:
        - Auth
      operationId: authLogin
      summary: 'Authenticate user'
      x-controller: 'AuthController::login'
      x-middleware:
        - csrf
        - 'rate:login,10'
      security: {  }
      responses:
        200:
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        403:
          $ref: '#/components/responses/Forbidden'
        429:
          $ref: '#/components/responses/RateLimited'
          description: 'Rate limit (10/min/IP after 5 failed attempts → +5min lockout)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        400:
          $ref: '#/components/responses/ValidationError'
        302:
          description: 'Redirect to home or `?redirect=` on success, to `/login?error=...` on failure'
      description: |
        Validate credentials + create session. Rate-limited 10/min/IP.
        On success: session cookie set + redirect to `?redirect=` (whitelist).

        Side-effects:
        - `session_regenerate_id(true)` (anti-fixation)
        - `users.last_login_at` updated
        - `access_log` row inserted

        On failure: HTTP 302 to `/login?error=<reason>&redirect=<original>`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
