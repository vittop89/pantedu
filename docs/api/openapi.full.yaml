  /api/teacher/content:
    get:
      tags:
        - 'Teacher Content'
      operationId: teacherContentIndex
      summary: 'List teacher content (filtered)'
      x-controller: 'TeacherContentController::index'
      responses:
        200:
          description: 'Content list'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherContentList'
          headers:
            ETag:
              schema:
                type: string
                example: '"a1b2c3d4..."'
            Cache-Control:
              schema:
                type: string
                example: 'private, max-age=30, must-revalidate'
        401:
          $ref: '#/components/responses/Unauthorized'
        304:
          description: 'Not Modified (ETag match)'
        503:
          description: 'Database unavailable'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      description: |
        Returns teacher_content rows with optional filters. ETag conditional
        GET supportato (Phase 17 + Phase 25.A4 client cache): se If-None-Match
        matcha la signature corrente (max updated_at + count) ritorna 304.
      parameters:
        -
          name: type
          in: query
          schema:
            type: string
            enum:
              - esercizio
              - verifica
              - lab
              - mappa
              - risdoc
              - bes
        -
          name: subject
          in: query
          schema:
            type: string
            example: MAT
        -
          name: indirizzo
          in: query
          schema:
            type: string
            example: ITIA
        -
          name: classe
          in: query
          schema:
            type: string
            example: 3A
        -
          name: visibility
          in: query
          schema:
            type: string
            enum:
              - draft
              - published
              - archived
        -
          name: with_metadata
          in: query
          schema:
            type: integer
            enum:
              - 0
              - 1
        -
          name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        -
          name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        -
          name: If-None-Match
          in: header
          schema:
            type: string
