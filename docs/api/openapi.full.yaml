        403:
          $ref: '#/components/responses/Forbidden'
        429:
          $ref: '#/components/responses/RateLimited'
        400:
          $ref: '#/components/responses/ValidationError'
      description: |
        Self-service "right to be forgotten". Workflow:
        1. POST → status='pending_confirm', email con confirm token (TTL 7g)
        2. Click email → status='cooling_off', execute_after = NOW + 30g
        3. Cooling-off cancellabile via POST /me/cancel-deletion
        4. Cron daily executePending → crypto-shredding + anonymization

        Rate-limited 5/min/user.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeletionRequestSubmit'
