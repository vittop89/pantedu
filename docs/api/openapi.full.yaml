openapi: 3.1.0
info:
  title: 'Pantedu API'
  version: 1.0.0
  description: |
    REST API per Pantedu — piattaforma educativa di didattica della fisica.

    **Generato automaticamente** da `tools/api/generate_openapi.php`. Le
    annotazioni request/response schema sui 30 endpoint critici sono manuali
    (sezione `paths` di `docs/api/openapi.yaml`).

    Auth: session cookie (PANTEDU_SID, httponly, samesite=Lax) o Bearer
    token solo su `/metrics`.
  contact:
    name: 'DPO Pantedu'
    url: 'https://pantedu.eu/dpo-contact'
  license:
    name: Proprietary
servers:
  -
    url: 'https://www.pantedu.eu'
    description: Production
  -
    url: 'http://pantedu.local'
    description: 'Local dev (XAMPP)'
tags:
  -
    name: Misc
  -
    name: Auth
  -
    name: 'GDPR self-service (Art. 7/15-22)'
  -
    name: 'GDPR parent consent (Art. 8)'
  -
    name: 'GDPR DPO contact (Art. 12-22, 37-39)'
  -
    name: 'Trust Pages'
  -
    name: Observability
  -
    name: Registration
  -
    name: 'API Public'
  -
    name: Storage
  -
    name: Studio
  -
    name: 'Admin UI'
  -
    name: 'Teacher Content'
  -
    name: Risdoc
  -
    name: 'Risdoc Templates'
  -
    name: Admin
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: PANTEDU_SID
      description: 'Session cookie httponly + samesite=Lax + secure (prod).'
    bearerAuth:
      type: http
      scheme: bearer
      description: 'Bearer token (solo su `/metrics`, env METRICS_BEARER_TOKEN).'
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: |
        Token CSRF richiesto su POST/PUT/PATCH/DELETE. Recuperabile via
        GET /auth/csrf. Alternativa: campo form `_csrf`.
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: invalid_credentials
        retry_after:
          type: integer
          description: 'Seconds before retry (rate limit)'
    Success:
      type: object
      properties:
        ok:
          type: boolean
          example: true
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum:
            - guest
            - student
            - teacher
            - collaborator
            - administrator
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        active:
          type: boolean
    Consent:
      type: object
      properties:
        consent_type:
          type: string
          enum:
            - analytics
            - marketing
            - parent_8_minor
        status:
          type: string
          enum:
            - granted
            - revoked
        granted_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        text_version:
          type: string
    DeletionRequest:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum:
            - pending_confirm
            - cooling_off
            - executed
            - cancelled
            - expired
        execute_after:
          type: string
          format: date-time
          nullable: true
    TeacherContent:
      type: object
      properties:
        id:
          type: integer
        teacher_id:
          type: integer
        content_type:
          type: string
          enum:
            - esercizio
            - verifica
            - lab
            - mappa
            - risdoc
            - bes
        subject_code:
          type: string
          example: MAT
        indirizzo:
          type: string
          example: ITIA
        classe:
          type: string
          example: 3A
        topic:
          type: string
        title:
          type: string
        visibility:
          type: string
          enum:
            - draft
            - published
            - archived
        metadata:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
        - username
        - password
        - _csrf
      properties:
        username:
          type: string
          maxLength: 50
          example: vittorio
        password:
          type: string
          format: password
          minLength: 8
          example: ••••••••
        _csrf:
          type: string
          description: 'CSRF token from GET /auth/csrf'
        redirect:
          type: string
          description: 'Path to redirect after successful login (whitelist /-prefixed only)'
          example: /
    LoginSuccess:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        username:
          type: string
        role:
          type: string
          enum:
            - student
            - teacher
            - collaborator
            - administrator
    RegistrationRequest:
      type: object
      required:
        - username
        - email
        - password
        - first_name
        - last_name
        - role
        - accept_tos
        - _csrf
      properties:
        username:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        role:
          type: string
          enum:
            - student
            - teacher
        institute_id:
          type: integer
          description: 'Required for student role'
        birth_date:
          type: string
          format: date
          description: |
            Required if role=student. Birth date YYYY-MM-DD.
            Se età < 14 (Italia D.Lgs. 101/2018), richiede `parent_email`.
        parent_email:
          type: string
          format: email
          description: |
            Required if studente minore (< 14 anni). Innesca workflow Art. 8 GDPR
            con doppio opt-in genitore (token TTL 30g).
        parent_name:
          type: string
          description: 'Optional, for personalized parent email greeting'
        accept_tos:
          type: boolean
          description: 'Must be true (Art. 7 GDPR)'
        _csrf:
          type: string
    ConsentGrantRequest:
      type: object
      required:
        - consent_type
        - _csrf
      properties:
        consent_type:
          type: string
          enum:
            - analytics
            - marketing
            - parent_8_minor
        text_version:
          type: string
          description: 'Version of informativa to consent to (e.g. v2.0)'
        _csrf:
          type: string
    ConsentList:
      type: object
      properties:
        consents:
          type: array
          items:
            $ref: '#/components/schemas/Consent'
    DeletionRequestSubmit:
      type: object
      required:
        - _csrf
      properties:
        reason:
          type: string
          maxLength: 500
          description: 'Optional reason text'
        _csrf:
          type: string
    DeletionRequestSuccess:
      type: object
      properties:
        ok:
          type: boolean
        request_id:
          type: integer
        confirm_token_sent_to:
          type: string
          format: email
          description: 'User email — token in email body, not in API response'
    ParentConsentConfirmRequest:
      type: object
      required:
        - _csrf
      properties:
        action:
          type: string
          enum:
            - confirm
            - reject
        _csrf:
          type: string
    ProfilePatchRequest:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        _csrf:
          type: string
    ExportData:
      type: object
      description: |
        GDPR Art. 20 portability — user data + consents + content + overrides.
        Returned as JSON download (Content-Disposition: attachment).
      properties:
        user:
          $ref: '#/components/schemas/User'
        consents:
          type: array
          items:
            $ref: '#/components/schemas/Consent'
        teacher_content:
          type: array
          items:
            $ref: '#/components/schemas/TeacherContent'
        risdoc_overrides:
          type: array
          items:
            type: object
            properties:
              template_id:
                type: integer
              instance_key:
                type: string
              kind:
                type: string
                enum:
                  - html
                  - tex
                  - css
                  - json
                  - image
                  - texCommon
              relative_path:
                type: string
              body:
                type: string
                nullable: true
        exported_at:
          type: string
          format: date-time
    DpoContactRequest:
      type: object
      required:
        - name
        - email
        - subject
        - message
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        subject:
          type: string
          enum:
            - access
            - rectification
            - erasure
            - portability
            - restriction
            - objection
            - consent_revoke
            - breach_report
            - other
        message:
          type: string
          maxLength: 5000
        url_field:
          type: string
          description: 'Honeypot anti-spam — must be empty'
          example: ''
    TeacherContentList:
      type: object
      properties:
        ok:
          type: boolean
        count:
          type: integer
        rows:
          type: array
          items:
            $ref: '#/components/schemas/TeacherContent'
    MetricsResponse:
      type: string
      description: |
        Prometheus exposition format text/plain version=0.0.4. Gauge + counter
        aggregati: users_total, teacher_content_total, consents_active_total,
        deletion_requests_total, dpo_requests_total, parent_consents_total,
        crypto_keys_total, crypto_access_24h_total, app_info.
      example: |
        # HELP pantedu_app_info Application info
        # TYPE pantedu_app_info gauge
        pantedu_app_info{version="25.E"} 1
        # HELP pantedu_users_total Users by role and status
        # TYPE pantedu_users_total gauge
        pantedu_users_total{role="teacher",status="active"} 12
  responses:
    Unauthorized:
      description: 'Authentication required'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: 'CSRF token invalid or insufficient privileges'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 'Resource not found'
    RateLimited:
      description: 'Rate limit exceeded'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: 'Invalid input (missing/malformed field)'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
