<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — Pantedu</title>
    <link rel="stylesheet" href="/css/critical.css">
    <style>
        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 1rem;
            font-family: system-ui, sans-serif;
            background: var(--fm-c-bg);
            color: var(--fm-c-text);
        }
        .offline-card {
            max-width: 28rem;
            background: var(--fm-c-surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .offline-card h1 {
            margin: 0 0 0.5rem;
            font-size: 1.5rem;
        }
        .offline-card p {
            color: var(--fm-c-text-2);
            line-height: 1.5;
            margin: 0.5rem 0;
        }
        .offline-card button {
            margin-top: 1rem;
            padding: 0.6rem 1.2rem;
            font: inherit;
            font-weight: 600;
            background: var(--fm-c-primary);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            min-height: 44px;
        }
        .offline-card button:hover { filter: brightness(1.1); }
        .offline-card button:focus-visible { outline: 2px solid var(--fm-c-focus-ring); outline-offset: 2px; }
        .icon { font-size: 3rem; line-height: 1; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
<a href="#main" class="fm-skip-link">Salta al contenuto</a>
<main id="main" tabindex="-1">
<div class="offline-card">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>Sei offline</h1>
    <p>Non riesco a raggiungere Pantedu in questo momento.</p>
    <p>Le pagine già visitate sono disponibili nella cache. Le modifiche saranno
       sincronizzate quando ti riconnetterai.</p>
    <button type="button" onclick="location.reload()">Riprova</button>
</div>
</main>
<script>
    // Auto-retry quando torna online
    window.addEventListener("online", () => location.reload());
</script>
</body>
</html>
